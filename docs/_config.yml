title: Recon Product Suite Documentation
description: Unified documentation hub for the Recon product suite.
remote_theme: just-the-docs/just-the-docs@v0.6.1

url: "https://www.reconapps-docs.com"  # Your custom domain URL
baseurl: ""  # Leave this blank for a custom domain

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# Mermaid configuration
mermaid:
  enabled: true
  version: "10.6.1"
  parameters:
    theme: forest

# Collections configuration
collections:
  pages:
    output: true
    permalink: "/:path/"

# Just the Docs specific configuration
search_enabled: true
color_scheme: light
back_to_top: true
back_to_top_text: "Back to top"
footer_content: "Copyright &copy; 2026 Recon Apps. All rights reserved."

# Enable copy code button
enable_copy_code_button: true

# Enable anchor headings
heading_anchors: true

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

# Search settings
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true
  placeholder_text: "Search Recon Product Documentation"

# Exclude files from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Maximum amount of items in search results
search_max_preview_chars: 150

# Default layout configuration
defaults:
  -
    scope:
      path: ""
    values:
      layout: default
  -
    scope:
      path: "assets"
    values:
      layout: null

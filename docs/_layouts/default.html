<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
{% include head.html %}
<body class="{% if page.landing %}landing-page{% endif %}"
      data-nav-scope="{{ page.nav_scope | default: '' }}"
      data-nav-title="{{ page.nav_scope_title | default: '' }}"
      data-nav-root="{{ page.nav_scope_root | default: '' }}">
  <a class="skip-to-main" href="#main-content">Skip to main content</a>
  {% include icons/icons.html %}
  {% unless page.landing %}
    {% include components/sidebar.html %}
  {% endunless %}
  <div class="main{% if page.landing %} landing-main{% endif %}" id="top">
    {% unless page.landing %}
      {% include components/header.html %}
    {% endunless %}
    <div class="main-content-wrap">
      {% include components/breadcrumbs.html %}
      <div id="main-content" class="main-content">
        <main>
          {{ content }}
        </main>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('pre code.language-mermaid').forEach(function (block) {
        var wrapper = document.createElement('div');
        wrapper.className = 'mermaid';
        wrapper.textContent = block.textContent;
        block.parentElement.replaceWith(wrapper);
      });

      mermaid.initialize({
        startOnLoad: true,
        theme: 'forest',
        securityLevel: 'loose'
      });
    });
  </script>
  <script src="{{ '/assets/js/custom.js' | relative_url }}"></script>
</body>
</html>
